<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>運動習慣大作戦</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="運動大作戦">
    
    <link rel="apple-touch-icon" href="icon.png?v=3">

    <style>
        body {
            background-color: #f0f8ff; 
            text-align: center;       
            font-family: 'Helvetica Neue', Arial, sans-serif;
            padding: 20px;
            color: #333;
            padding-top: env(safe-area-inset-top);
        }
        #messageDisplay {
            color: #555;
            font-style: italic;
            min-height: 4em;
            margin: 20px auto;
            max-width: 500px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px dashed #ccc;
        }
        .button-group {
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }
        button {
            padding: 15px 20px;
            margin: 5px;
            border-radius: 25px;     
            border: none;
            background-color: #ff7f50; 
            color: white;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            -webkit-tap-highlight-color: transparent;
        }
        button:active { transform: scale(0.95); opacity: 0.8; }
        
        .clear-btn {
            background-color: #bbb;
            font-size: 0.8em;
            margin-top: 40px;
        }

        ul {
            list-style: none;
            padding: 0;
            max-width: 500px;
            margin: 0 auto;
        }
        li {
            background: #fff;
            margin: 10px 0;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeIn 0.3s ease-in;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .log-time { color: #888; font-size: 0.8em; }
        .log-name { font-weight: bold; font-size: 1.1em; }
    </style>
</head>

<body>
    <h1>運動習慣大作戦</h1>
    
    <div id="messageDisplay">（運動を記録すると名言が出ます）</div>

    <div style="margin-bottom: 20px;">
        <label style="font-size: 0.9em; color: #666;">今日の調子は？</label><br>
        <select id="scoreSelect" style="padding: 10px; border-radius: 10px; border: 1px solid #ccc; margin-top: 5px; font-size: 16px;">
            <option value="⭐⭐⭐⭐⭐">5: 最高！</option>
            <option value="⭐⭐⭐⭐">4: 良い</option>
            <option value="⭐⭐⭐" selected>3: 普通</option>
            <option value="⭐⭐">2: まあまあ</option>
            <option value="⭐">1: しんどかった</option>
        </select>
    </div>

    <div class="button-group">
        <button onclick="recordWorkout('サッカー')">サッカー</button>
        <button onclick="recordWorkout('ランニング')">ランニング</button>
        <button onclick="recordWorkout('体幹')">体幹</button>
        <button onclick="recordWorkout('整体')">整体</button>
        <button onclick="recordWorkout('ストレッチ')">ストレッチ</button>
    </div>

    <ul id="logList"></ul>

    <button onclick="clearLogs()" class="clear-btn">記録をすべて消去</button>

    <script>
        const messages = [
            "「継続は力なり。」",
            "「今日逃げたら、明日はもっと大きな勇気が必要になる。」",
            "「完璧を目指すより、まずは終わらせろ。」",
            "「運動は運を動かすことである！」",
            "「読書は精神の、運動は肉体のためのものである。」"
        ];

        // 絵文字をあなたの指定に変更しました！
        const icons = {
            "サッカー": "⚽️",
            "ランニング": "🏃",
            "体幹": "🏋️",
            "整体": "💆",
            "ストレッチ": "🤸"
        };

        window.onload = function() {
            const savedData = JSON.parse(localStorage.getItem("workoutLogs")) || [];
            savedData.forEach(item => {
                addLogToScreen(item.time, item.name, item.score || "");
            });
        };

        function recordWorkout(name) {
            const randomMessage = messages[Math.floor(Math.random() * messages.length)];
            document.getElementById("messageDisplay").textContent = randomMessage;

            const score = document.getElementById("scoreSelect").value;
            const now = new Date();
            const timeString = (now.getMonth() + 1) + "/" + now.getDate() + " " + now.getHours() + ":" + now.getMinutes().toString().padStart(2, '0');
            
            addLogToScreen(timeString, name, score);
            saveData(timeString, name, score);
        }

        function addLogToScreen(time, name, score) {
            const list = document.getElementById("logList");
            const newItem = document.createElement("li");
            const icon = icons[name] || "✨";
            
            newItem.innerHTML = `
                <div style="display: flex; align-items: center;">
                    <div style="font-size: 2em; margin-right: 15px;">${icon}</div>
                    <div style="text-align: left;">
                        <span class="log-name">${name}</span>
                        <div style="font-size: 0.8em; color: #ffa500;">${score}</div>
                    </div>
                </div>
                <span class="log-time">${time}</span>
            `;
            list.prepend(newItem);
        }

        function saveData(time, name, score) {
            const savedData = JSON.parse(localStorage.getItem("workoutLogs")) || [];
            savedData.push({ time: time, name: name, score: score });
            localStorage.setItem("workoutLogs", JSON.stringify(savedData));
        }

        function clearLogs() {
            if (confirm("本当にすべての記録を消去しますか？")) {
                localStorage.removeItem("workoutLogs");
                location.reload(); 
            }
        }
    </script>
</body>
</html>
